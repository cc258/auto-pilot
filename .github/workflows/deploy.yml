name: Deploy Build Only

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # 1. 本地构建
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install and Build
        run: |
          npm ci
          npm run build
      
      # 2. 只同步 build 目录到服务器
      - name: Deploy build to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.TX_HOST }}
          username: ${{ secrets.TX_USER }}
          key: ${{ secrets.TX_KEY }}
          source: "build/*"
          target: "~/www/web/auto-pilot/build"
          strip_components: 1  # 去掉 build/ 前缀